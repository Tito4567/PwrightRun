name: Playwright SDET CI/CD

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 8 * * *' # Approx. 3:00 AM/4:00 AM EST

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      # Continue even on failure so we can see what failed in the Allure report
      run: npx playwright test tests/
      continue-on-error: true

    # --- ALLURE REPORT GENERATION ---
    - name: Get Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    # --- CD DEPLOYMENT TO GITHUB PAGES ---
    - name: Setup GitHub Pages
      if: always()
      uses: actions/configure-pages@v4

    - name: Upload Allure Artifact to Pages
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        # We upload the generated allure-report, not the standard playwright-report
        path: allure-report

    - name: Deploy Allure Dashboard
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4