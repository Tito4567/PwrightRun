name: Playwright SDET CI/CD

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 8 * * *' 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      run: npx playwright test tests/
      continue-on-error: true

    # --- HISTORICAL TREND LOGIC ---
    
    # 1. Download the history from the last successful deployment on gh-pages
    - name: Get Allure History
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir # Download to a sub-folder to avoid overwriting current workspace

    # 2. Build the report and automatically link the history
    - name: Allure Report Action
      uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: allure-results
        # This points to where we downloaded the old report
        gh_pages: gh-pages-dir
        # This is the subfolder inside gh-pages where history lives
        allure_report: allure-report
        allure_history: allure-history
        keep_reports: 20

    # --- CD DEPLOYMENT TO GITHUB PAGES ---
    - name: Setup GitHub Pages
      if: always()
      uses: actions/configure-pages@v4

    - name: Upload Allure Artifact to Pages
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        # Important: simple-elf action outputs the final merged report here
        path: allure-report

    - name: Deploy Allure Dashboard
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4
