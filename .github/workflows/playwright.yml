name: Playwright SDET CI/CD

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 8 * * *' 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # --- STAGE 1: BUILD ---
  # Focus: Preparing the environment and dependencies
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm' # Speeds up future builds

      - name: Install Dependencies
        run: npm install

  # --- STAGE 2: TEST ---
  # Focus: Execution of the Playwright suite
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test tests/
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 1

  # --- STAGE 3: RELEASE ---
  # Focus: Generating the Allure Report and merging History
  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure History from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages-dir
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report as Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  # --- STAGE 4: DEPLOY ---
  # Focus: Moving the artifacts to the live server (GitHub Pages)
  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Allure Dashboard to Pages
        id: deployment
        uses: actions/deploy-pages@v4
