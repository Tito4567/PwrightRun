name: Playwright SDET CI/CD

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 8 * * *'

# These permissions are mandatory for the "Deploy" phase to succeed
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test tests/
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  deploy:
    # This ensures Deployment only happens after the CI (Test) job finishes
    needs: test
    if: always() 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the folder created by the 'test' job
          path: playwright-report/ 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4