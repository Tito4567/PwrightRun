name: Playwright SDET CI/CD

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 8 * * *' # Approx. 3:00 AM/4:00 AM EST

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-deploy:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    # Links this job to your GitHub Pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      run: npx playwright test tests/

    # --- CI Artifact Storage ---
    - name: Upload Standard Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

    # --- CD Deployment to GitHub Pages ---
    - name: Setup GitHub Pages
      if: always()
      uses: actions/configure-pages@v4

    - name: Upload to Pages Server
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/ 

    - name: Deploy Live Link
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4